# Nginx reverse proxy for Lotus Offer Generator
# Install on VPS if you access via port 80 / a domain name (not :17800 directly)
#
#   apt install nginx
#   cp deploy/nginx-lotus-offer.conf /etc/nginx/sites-available/lotus-offer
#   ln -sf /etc/nginx/sites-available/lotus-offer /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:17800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Required for login POST and file uploads
        proxy_method $request_method;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
}
