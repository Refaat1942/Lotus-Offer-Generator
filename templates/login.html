<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lotus Offer Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-bg-shapes">
        <div class="shape shape-circle shape-1"></div>
        <div class="shape shape-circle shape-2"></div>
        <div class="shape shape-circle shape-3"></div>
        <div class="shape shape-ring shape-4"></div>
        <div class="shape shape-ring shape-5"></div>
        <div class="shape shape-blob shape-6"></div>
        <div class="shape shape-blob shape-7"></div>
        <div class="shape shape-star shape-8">✦</div>
        <div class="shape shape-star shape-9">✦</div>
        <div class="shape shape-star shape-10">★</div>
        <div class="shape shape-dot shape-11"></div>
        <div class="shape shape-dot shape-12"></div>
        <div class="shape shape-dot shape-13"></div>
        <div class="shape shape-dot shape-14"></div>
        <div class="shape shape-pill shape-15"></div>
        <div class="shape shape-pill shape-16"></div>
    </div>

    <div class="floating-gifts" aria-hidden="true">
        <div class="gift-box gift-1"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#f59e0b"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#fbbf24"/><rect x="18" y="12" width="4" height="22" fill="#ef4444"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#ef4444"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#ef4444"/><circle cx="20" cy="12" r="2.5" fill="#dc2626"/></svg></div>
        <div class="gift-box gift-2"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#14b8a6"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#5eead4"/><rect x="18" y="12" width="4" height="22" fill="#f472b6"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#f472b6"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#f472b6"/><circle cx="20" cy="12" r="2.5" fill="#ec4899"/></svg></div>
        <div class="gift-box gift-3"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#f59e0b"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#fde68a"/><rect x="18" y="12" width="4" height="22" fill="#0d9488"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#0d9488"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#0d9488"/><circle cx="20" cy="12" r="2.5" fill="#0f766e"/></svg></div>
        <div class="gift-box gift-4"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#f472b6"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#fbcfe8"/><rect x="18" y="12" width="4" height="22" fill="#fbbf24"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#fbbf24"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#fbbf24"/><circle cx="20" cy="12" r="2.5" fill="#f59e0b"/></svg></div>
        <div class="gift-box gift-5"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#38bdf8"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#7dd3fc"/><rect x="18" y="12" width="4" height="22" fill="#ef4444"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#ef4444"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#ef4444"/><circle cx="20" cy="12" r="2.5" fill="#dc2626"/></svg></div>
        <div class="gift-box gift-6"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#a78bfa"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#c4b5fd"/><rect x="18" y="12" width="4" height="22" fill="#14b8a6"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#14b8a6"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#14b8a6"/><circle cx="20" cy="12" r="2.5" fill="#0d9488"/></svg></div>
        <div class="gift-box gift-7"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#f59e0b"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#fbbf24"/><rect x="18" y="12" width="4" height="22" fill="#ef4444"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#ef4444"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#ef4444"/><circle cx="20" cy="12" r="2.5" fill="#dc2626"/></svg></div>
        <div class="gift-box gift-8"><svg viewBox="0 0 40 40"><rect x="6" y="16" width="28" height="18" rx="2" fill="#14b8a6"/><rect x="5" y="12" width="30" height="6" rx="1.5" fill="#99f6e4"/><rect x="18" y="12" width="4" height="22" fill="#f59e0b"/><ellipse cx="14" cy="11" rx="5" ry="4" fill="#f59e0b"/><ellipse cx="26" cy="11" rx="5" ry="4" fill="#f59e0b"/><circle cx="20" cy="12" r="2.5" fill="#d97706"/></svg></div>
    </div>

    <div class="login-container animate-fade-in">
        <div class="login-card animate-slide-up">
            <div class="login-header">
                <div class="logo-showcase">
                    <div class="logo-glow-ring"></div>
                    <div class="logo-placeholder" id="loginLogo">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2"/>
                            <path d="M32 12 C32 12 20 24 20 36 C20 44 25 48 32 48 C39 48 44 44 44 36 C44 24 32 12 32 12Z" fill="currentColor" opacity="0.3"/>
                            <path d="M32 20 L32 44" stroke="currentColor" stroke-width="2"/>
                            <path d="M26 32 L38 32" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                </div>
                <h1>Lotus Offer Generator</h1>
                <p class="subtitle">Mix & Match Engine</p>
                <span class="version-badge">v{{ version }}</span>
            </div>

            {% if error %}
            <div class="alert alert-error animate-shake">{{ error }}</div>
            {% endif %}

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input login-input" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input login-input" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-login">
                    <span>Sign In</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>

            <p class="login-footer">Lotus Pharma &copy; {{ version }}</p>
        </div>
    </div>

    <script>
        fetch('/api/logo').then(r => {
            if (r.ok) {
                const img = document.createElement('img');
                img.src = '/api/logo?' + Date.now();
                img.alt = 'Lotus Logo';
                img.className = 'login-logo-img';
                document.getElementById('loginLogo').innerHTML = '';
                document.getElementById('loginLogo').appendChild(img);
            }
        }).catch(() => {});
    </script>
</body>
</html>
